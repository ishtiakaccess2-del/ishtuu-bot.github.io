<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Ishtuu QR Bot</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

    <div id="login-screen">
        <h1>Ishtuu-এ স্বাগতম!</h1>
        <button onclick="googleLogin()">Google দিয়ে লগইন করুন</button>
    </div>

    <div id="bot-screen" style="display:none;">
        <h2 id="welcome-msg"></h2>
        <p>আমি ইস্তু (ishtuu)। তোমার কি প্রয়োজন আজ?</p>
        
        <div>
            <button onclick="showInput('ফোন নম্বর')">ফোন নম্বর</button>
            <button onclick="showInput('লিঙ্ক')">লিঙ্ক</button>
            <button onclick="showInput('মেসেজ')">মেসেজ</button>
        </div>

        <div id="input-section" style="margin-top: 20px;"></div>
        <div id="qrcode"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
