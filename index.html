<div class="container">
    <div class="bot-logo">🤖</div> <!-- লোগো -->
    <h1>Ishtuu Bot</h1>
    
    <div id="chat-container">
        <p><b>Ishtuu:</b> হ্যালো! আমি ইস্তু। তুমি কি কি তৈরি করতে চাও? (ফোন, লিঙ্ক, টেক্সট বা ইমোজি লিখুন)</p>
    </div>

    <input type="text" id="userInput" placeholder="কমান্ড লিখুন...">
    <button onclick="processCommand()">Send</button>
    
    <div id="qr-result" style="display:none;">
        <div id="qrcode"></div>
        <a id="downloadBtn" download="my-qr.png">QR কোড ডাউনলোড করুন</a>
    </div>
</div>
