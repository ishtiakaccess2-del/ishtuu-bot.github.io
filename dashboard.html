<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Ishtuu Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
</head>
<body>
    <div class="container">
        <div id="user-info"></div>
        <div id="chat-container"></div>
        <div class="input-group">
            <input type="text" id="userInput" placeholder="কিছু লিখুন...">
            <button onclick="processCommand()">Send</button>
        </div>
        <div id="qrcode"></div>
        <a id="downloadBtn" download="qr.png">ডাউনলোড</a>
        <button onclick="logout()" style="background:red; margin-top:10px;">Logout</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
